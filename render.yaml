services:
  - type: web
    name: milkman-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.render.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: false
      - key: DATABASE_SSL_REQUIRE
        value: true
      - key: TRUST_PROXY_SSL_HEADER
        value: true
      - key: USE_X_FORWARDED_HOST
        value: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: CSRF_COOKIE_SECURE
        value: true
      - key: SESSION_COOKIE_SAMESITE
        value: None
      - key: CSRF_COOKIE_SAMESITE
        value: None
