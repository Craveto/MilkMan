name: Deploy To Azure VM

on:
  push:
    branches:
      - azureDeploy
  workflow_dispatch:

concurrency:
  group: azure-vm-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: bash
        run: |
          set -eu
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.AZURE_VM_PORT || '22' }}" "${{ secrets.AZURE_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on Azure VM
        shell: bash
        run: |
          set -eu
          ssh -p "${{ secrets.AZURE_VM_PORT || '22' }}" "${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}" << 'EOF'
          set -e

          cd /var/www/milkman
          git fetch origin
          git checkout azureDeploy
          git pull origin azureDeploy

          cd /var/www/milkman/backend
          . venv/bin/activate
          pip install -r requirements.render.txt
          python manage.py migrate
          python manage.py collectstatic --noinput

          cd /var/www/milkman/frontend
          npm install
          npm run build

          sudo systemctl restart milkman-backend
          sudo systemctl restart milkman-frontend
          sudo systemctl reload nginx
          EOF
